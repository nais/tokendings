[settings]
pin = true

[tools]
java = "temurin-21.0.10+7.0.LTS"
helm = "3.16.2"
step = "0.30.2"
"aqua:sethvargo/ratchet" = "0.11.4"

[tasks.services]
description = "Start local infrastructure (Postgres, mock-oauth2-server, otel)"
run = "docker compose up -d"

[tasks.local]
description = "Build and run Tokendings locally"
depends = ["services"]
run = "./gradlew run"

[tasks.test-exchange]
description = "End-to-end token exchange against the local Tokendings"
run = "./scripts/test-token-exchange.sh"

[tasks."check:helm-lint"]
description = "Lint helm chart"
run = "helm lint --strict ./charts"

[tasks."check:actions-lint"]
description = "Check for unpinned actions"
run = "ratchet lint .github/workflows/*.yml"

[tasks."actions:update"]
description = "Upgrade all github actions to latest version satisfying their version tag"
run = "ratchet update .github/workflows/*.yml"

[tasks."actions:upgrade"]
description = "Upgrade all github actions to latest"
run = "ratchet upgrade .github/workflows/*.yml"
