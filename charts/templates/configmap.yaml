apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tokenx.fullname" . }}
  labels:
    {{- include "tokenx.tokendings.labels" . | nindent 4 }}
data:
  {{- if .Values.tokendings.mapSubjectTokenClaims }}
  SUBJECT_TOKEN_MAPPINGS: |
    {
      "https://test.idporten.no/.well-known/openid-configuration": {
        "acr": {
            "idporten-loa-substantial": "Level3",
            "idporten-loa-high": "Level4"
        }
      },
      "https://idporten.no/.well-known/openid-configuration": {
        "acr": {
            "idporten-loa-substantial": "Level3",
            "idporten-loa-high": "Level4"
        }
      }
    }
  {{- end }}
  {{- if or .Values.tokendings.authWellKnownUrl .Values.tokendings.authProviderConfigs}}
  AUTH_PROVIDER_CONFIGS: |
    {{- if .Values.tokendings.authProviderConfigs }}
    {{ .Values.tokendings.authProviderConfigs | toJson }}
    {{- else if .Values.tokendings.authWellKnownUrl }}
    [{"wellKnownUrl": "{{ .Values.tokendings.authWellKnownUrl }}", "allowedSubjects": ["system:serviceaccount:nais-system:tokenx-jwker"]}]
    {{- end }}
  {{- end }}
