repository: europe-north1-docker.pkg.dev/nais-io/nais/images

team: nais

fasit: # mapped from Fasit
  tenant:
    name: ""
  env:
    name: ""

networkPolicy:
  enabled: false
  apiServerCIDR:

tokendings:
  replicas:
    min: 2
    max: 4
  resources:
    limits:
      memory: 2Gi
    requests:
      memory: 1Gi
      cpu: 750m
  image: tokendings
  tag: latest
  env:
    APPLICATION_PROFILE: "PROD"
    SUBJECT_TOKEN_ISSUERS: ""
    APPLICATION_PORT: "8080"
    AUTH_CLIENT_JWKS: ""
    TOKEN_EXPIRY_SECONDS: 900
    JDK_JAVA_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:ActiveProcessorCount=4"
  accessPolicy:
    outboundHosts: []
  database:
    diskSize: 10
    highAvailability: true
    tier:
    sqlinstance_name: tokendings
  host:
  mapSubjectTokenClaims: false
  registrationApi:
    authWellKnownUrl: ""
    authOnPremWellKnownUrl: ""
    useServiceAccountAuth: true
