services:
  database:
    image: "postgres"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pwd
      POSTGRES_DB: token-exchange
    ports:
      - "5432:5432"
    #volumes:
    #  - database-data:/var/lib/postgresql/data/ # persist data even if container shuts down
  oauth-server:
    image: ghcr.io/navikt/mock-oauth2-server:3.0.1
    ports:
      - "7070:7070"
    environment:
      PORT: "7070"
  otel:
    image: grafana/otel-lgtm:latest
    ports:
      - "3001:3000"
      - "4317:4317"
      - "4318:4318"
