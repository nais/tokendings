name: Build, push and sign
on:
  push:
    branches:
      - master
    paths-ignore:
      - "*.md"
env:
  FEATURE_REPOSITORY: oci://europe-north1-docker.pkg.dev/nais-io/nais/feature

permissions:
  contents: read

jobs:
  build_push_sign:
    permissions:
      contents: write
      id-token: write
      packages: write
    outputs:
      img_to_deploy: ${{ steps.build-push-sign.outputs.tag }}
      version: ${{ steps.build-push-sign.outputs.version }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # ratchet:actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # ratchet:gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          dependency-graph: generate-and-submit
      - name: Gradle build
        run: ./gradlew build installDist
      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # ratchet:sigstore/cosign-installer@v4.1.1
      - name: Verify distroless base image
        run: |
          cosign verify \
          --certificate-identity "keyless@distroless.iam.gserviceaccount.com" \
          --certificate-oidc-issuer "https://accounts.google.com" \
          gcr.io/distroless/java21-debian13:nonroot
      - name: "Build and push image"
        uses: nais/platform-build-push-sign@df590279b21bc5978519685752f9eaddd546043c # ratchet:nais/platform-build-push-sign@main
        id: build-push-sign
        with:
          name: tokendings
          google_service_account: gh-tokendings
          workload_identity_provider: ${{ secrets.NAIS_IO_WORKLOAD_IDENTITY_PROVIDER }}
          push_ghcr: true
          multi-platform: true
      - name: Update values.yaml
        run: |
          yq -i ".tokendings.tag = \"${{ steps.build-push-sign.outputs.version }}\"" charts/values.yaml
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # ratchet:azure/setup-helm@v5
        name: "Setup Helm"
        with:
          version: "v3.15.1"
      - name: Build Chart
        run: |-
          yq -i ".version = \"${{ steps.build-push-sign.outputs.version }}\"" charts/Chart.yaml
          helm package charts
      - name: Push Chart
        run: |-
          helm push tokenx*.tgz ${{ env.FEATURE_REPOSITORY }}
  rollout:
    needs:
      - build_push_sign
    runs-on: fasit-deploy
    permissions:
      id-token: write
    steps:
      - uses: nais/fasit-deploy@6e5772c21e82cb101537dd5e3ce78d70e2ae6402 # ratchet:nais/fasit-deploy@v3
        with:
          chart: ${{ env.FEATURE_REPOSITORY }}/tokenx
          version: ${{ needs.build_push_sign.outputs.version }}
          target: |
            {"kind":"tenant","tenant":"dev-nais"}
      - uses: nais/fasit-deploy@6e5772c21e82cb101537dd5e3ce78d70e2ae6402 # ratchet:nais/fasit-deploy@v3
        with:
          chart: ${{ env.FEATURE_REPOSITORY }}/tokenx
          version: ${{ needs.build_push_sign.outputs.version }}
          target: |
            {"kind":"tenant","tenant":"nav"}
